name: 0. Daily Sync & Build

on:
  workflow_dispatch:
  schedule:
    # 中国时间每天凌晨 1 点（UTC 17:00）
    - cron: '0 17 * * *'

permissions:
  contents: write

env:
  # PT 主站凭据（读 4964、读写 18818）
  PARATRANZ_TOKEN: ${{ secrets.PARATRANZ_TOKEN }}
  PT_4964_ID: ${{ secrets.PARATRANZ_PROJECT_ID }}
  PT_18818_ID: ${{ secrets.PARATRANZ_DAILY_PROJECT_ID }}
  # 兼容旧命名；脚本会自动读取其中之一
  PARATRANZ_DAILY_PROJECT_ID: ${{ secrets.PARATRANZ_DAILY_PROJECT_ID }}

  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 构建/缓存/上游克隆目录（脚本都从这里读）
  BUILD_DIR: .build
  CACHE_DIR: .cache
  REPO_CACHE_DIR: .repo.cache

  # 最终 7z 输出位置
  ASSETS_PATH: .assets.local.d

jobs:
  daily:
    name: Daily Sync & Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # .cache 里保存的是跨 run 的 state（en-lastrun、zh-lastrun、file-ids、
      # newlines.json、pending-update.json）。上游仓库 sparse-clone 也缓存到
      # .repo.cache 避免每天重新拉。
      - name: Setup Datetime Envs
        uses: Kiwi233/Translation-of-GTNH/.github/actions/run-script@master
        with:
          script: setup-nightly-build-datetime-envs.ts

      - name: Restore Daily Cache
        uses: actions/cache@v4
        with:
          path: |
            .cache
            .repo.cache
          key: daily-${{ env.NB_LOCAL_DATE }}
          restore-keys: |
            daily-

      # ========== 10 步流水线 ==========
      - name: Fetch English (A–G) + Normalize Newlines
        shell: bash
        run: stdbuf -oL -eL bun .github/scripts/daily/fetch-en.ts

      - name: Diff English vs Last Run
        shell: bash
        run: stdbuf -oL -eL bun .github/scripts/daily/diff-en.ts

      - name: Push English to PT 18818
        shell: bash
        run: stdbuf -oL -eL bun .github/scripts/daily/push-en.ts

      - name: Pull PT 4964 + Stage Kiwi233 Extras
        shell: bash
        run: stdbuf -oL -eL bun .github/scripts/daily/pull-zh-4964.ts

      - name: Diff Chinese Against Last Snapshot
        shell: bash
        run: stdbuf -oL -eL bun .github/scripts/daily/diff-zh.ts

      - name: Refresh StringIds for Touched Files
        shell: bash
        run: stdbuf -oL -eL bun .github/scripts/daily/refresh-ids.ts

      - name: Push Chinese Translations (normal + stale markers)
        shell: bash
        run: stdbuf -oL -eL bun .github/scripts/daily/push-zh.ts

      - name: Pull Final 18818 State (forward translations)
        shell: bash
        run: stdbuf -oL -eL bun .github/scripts/daily/pull-final-18818.ts

      - name: Rebuild .lang Files and Pack 7z
        shell: bash
        run: stdbuf -oL -eL bun .github/scripts/daily/restore-and-pack.ts
        env:
          ARCHIVE_NAME: daily-${{ env.NB_LOCAL_DATE }}.7z

      # ========== Tag & Release ==========
      - name: Push Tag
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag -f ${{ env.NB_TAG }}
          git push --delete origin ${{ env.NB_TAG }} || true
          git push origin ${{ env.NB_TAG }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.NB_TAG }}
          name: 每日构建 - ${{ env.NB_LOCAL_DATE }}
          body: |
            请阅读主页 README 以获知详细用法

            自动构建于 ${{ env.NB_LOCAL_DATE }} ${{ env.NB_LOCAL_TIME }}
          files: ${{ env.ASSETS_PATH }}/*

  cleanup-outdated-daily-builds:
    name: Cleanup Outdated Daily Builds
    needs: daily
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Setup Datetime Envs
        uses: Kiwi233/Translation-of-GTNH/.github/actions/run-script@master
        with:
          script: setup-nightly-build-datetime-envs.ts

      - name: Cleanup Outdated Daily Builds
        uses: Kiwi233/Translation-of-GTNH/.github/actions/run-script@master
        with:
          script: cleanup-nightly-builds.ts
