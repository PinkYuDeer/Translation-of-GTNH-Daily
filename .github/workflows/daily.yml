name: 0. Daily Sync & Build

on:
  workflow_dispatch:
    inputs:
      force:
        description: '强制模式：将所有合并/换行规范化后的文件重新推送到 PT 18818'
        type: boolean
        default: false
      skip_gt5u:
        description: '跳过 GT5U runClient，直接使用缓存的 GregTech.lang'
        type: boolean
        default: false
  schedule:
    # 中国时间每天凌晨 1 点（UTC 17:00）
    - cron: '0 17 * * *'

permissions:
  actions: write
  contents: write

env:
  # PT 主站凭据（读 4964、读写 18818）
  PARATRANZ_TOKEN: ${{ secrets.PARATRANZ_TOKEN }}
  PT_4964_ID: ${{ secrets.PARATRANZ_PROJECT_ID }}
  PT_18818_ID: ${{ secrets.PARATRANZ_DAILY_PROJECT_ID }}
  # 兼容旧命名；脚本会自动读取其中之一
  PARATRANZ_DAILY_PROJECT_ID: ${{ secrets.PARATRANZ_DAILY_PROJECT_ID }}

  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 构建/缓存/上游克隆目录（脚本都从这里读）
  BUILD_DIR: .build
  CACHE_DIR: .cache
  REPO_CACHE_DIR: .repo.cache

  # 最终 7z 输出位置
  ASSETS_PATH: .assets.local.d

jobs:
  daily:
    name: Daily Sync & Build
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java for GT5U
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Setup Headless Client Tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb \
            xdotool \
            x11-xserver-utils \
            mesa-utils \
            libgl1-mesa-dri \
            libopenal1 \
            libxrandr2 \
            libxxf86vm1

      # .cache 里保留少量可复用状态（fileIds、newlines 等）以及 GT5U
      # GregTech.lang 兜底缓存；每次仍会重拉当前 PT 18818 与上游 4964。
      # 上游 sparse-clone 及 GT5U checkout 缓存在 .repo.cache 里，避免每天重新拉。
      # GitHub Actions cache 以 ref 为作用域且不可覆写，故 key 显式带 branch；
      # restore 只回溯同 branch 旧日缓存。
      - name: Setup Datetime Envs
        uses: Kiwi233/Translation-of-GTNH/.github/actions/run-script@master
        with:
          script: setup-nightly-build-datetime-envs.ts

      - name: Restore Daily Cache
        id: restore-daily-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .cache
            .repo.cache
          key: daily-${{ github.ref_name }}-${{ env.NB_LOCAL_DATE }}
          restore-keys: |
            daily-${{ github.ref_name }}-

      # ========== 三源整合流水线 ==========
      - name: Generate GregTech.lang from Latest GT5U
        shell: bash
        env:
          GT5U_LANG_TIMEOUT_MS: 2400000
          GT5U_LANG_MIN_ENTRIES: 2000
          GT5U_CLOSE_AFTER_POSTLOAD_MS: 180000
          GT5U_LANG_USE_CACHE_ONLY: ${{ inputs.skip_gt5u == true && '1' || '' }}
        run: stdbuf -oL -eL bun .github/scripts/daily/generate-gregtech-lang.ts

      - name: Fetch English (A–G) + Normalize Newlines
        shell: bash
        run: stdbuf -oL -eL bun .github/scripts/daily/fetch-en.ts

      - name: Pull Current PT 18818 State
        shell: bash
        run: stdbuf -oL -eL bun .github/scripts/daily/pull-current-18818.ts

      - name: Pull PT 4964 + Stage Kiwi233 Extras
        shell: bash
        run: stdbuf -oL -eL bun .github/scripts/daily/pull-zh-4964.ts

      - name: Sync ParaTranz Terms (4964 -> 18818)
        shell: bash
        run: stdbuf -oL -eL bun .github/scripts/daily/sync-terms.ts

      - name: Merge English + PT 18818 + PT 4964 Locally
        shell: bash
        env:
          FORCE: ${{ inputs.force == true && '1' || '' }}
        run: stdbuf -oL -eL bun .github/scripts/daily/merge-final.ts

      - name: Push Merged Final Files to PT 18818
        shell: bash
        run: stdbuf -oL -eL bun .github/scripts/daily/push-final.ts

      - name: Commit Archived Retired PT Files
        shell: bash
        run: |
          if [ -z "$(git status --porcelain -- archive)" ]; then
            echo "[archive] no retired PT files to commit"
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add archive
          git commit -m "Archive retired PT files"
          git push

      - name: Rebuild .lang Files and Pack 7z
        shell: bash
        run: stdbuf -oL -eL bun .github/scripts/daily/restore-and-pack.ts
        env:
          ARCHIVE_NAME: daily-${{ env.NB_LOCAL_DATE }}.7z

      - name: Save Daily Cache
        if: steps.restore-daily-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            .cache
            .repo.cache
          key: daily-${{ github.ref_name }}-${{ env.NB_LOCAL_DATE }}

      - name: Prune Old Daily Caches
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CACHE_PREFIX: daily-${{ github.ref_name }}-
          KEEP_KEY: daily-${{ github.ref_name }}-${{ env.NB_LOCAL_DATE }}
          REPO: ${{ github.repository }}
        run: |
          stdbuf -oL -eL bun -e '
            const repo = process.env.REPO;
            const prefix = process.env.CACHE_PREFIX;
            const keepKey = process.env.KEEP_KEY;
            const token = process.env.GH_TOKEN;
            if (!repo || !prefix || !keepKey || !token)
              throw new Error("missing cache prune env");
            const headers = {
              Authorization: `Bearer ${token}`,
              Accept: "application/vnd.github+json",
              "User-Agent": "gtnh-daily-cache-pruner",
            };
            const listRes = await fetch(`https://api.github.com/repos/${repo}/actions/caches?per_page=100`, { headers });
            if (!listRes.ok)
              throw new Error(`list caches failed: ${listRes.status} ${await listRes.text()}`);
            const data = await listRes.json();
            const caches = (data.actions_caches ?? [])
              .filter(cache => typeof cache.key === "string" && cache.key.startsWith(prefix))
              .sort((a, b) => {
                const ta = Date.parse(a.last_accessed_at ?? a.created_at ?? 0);
                const tb = Date.parse(b.last_accessed_at ?? b.created_at ?? 0);
                return tb - ta;
              });
            const keep = caches.find(cache => cache.key === keepKey) ?? caches[0];
            if (!keep) {
              console.log(`[daily-cache] no cache found for prefix ${prefix}`);
              process.exit(0);
            }
            console.log(`[daily-cache] keeping ${keep.key} (#${keep.id})`);
            for (const cache of caches) {
              if (cache.id === keep.id)
                continue;
              const delRes = await fetch(`https://api.github.com/repos/${repo}/actions/caches/${cache.id}`, {
                method: "DELETE",
                headers,
              });
              if (!delRes.ok)
                throw new Error(`delete cache ${cache.id} failed: ${delRes.status} ${await delRes.text()}`);
              console.log(`[daily-cache] deleted ${cache.key} (#${cache.id})`);
            }
          '

      # ========== Tag & Release ==========
      - name: Push Tag
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag -f ${{ env.NB_TAG }}
          git push --delete origin ${{ env.NB_TAG }} || true
          git push origin ${{ env.NB_TAG }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.NB_TAG }}
          name: 每日构建 - ${{ env.NB_LOCAL_DATE }}
          body: |
            请阅读主页 README 以获知详细用法

            自动构建于 ${{ env.NB_LOCAL_DATE }} ${{ env.NB_LOCAL_TIME }}
          files: ${{ env.ASSETS_PATH }}/*

  cleanup-outdated-daily-builds:
    name: Cleanup Outdated Daily Builds
    needs: daily
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Setup Datetime Envs
        uses: Kiwi233/Translation-of-GTNH/.github/actions/run-script@master
        with:
          script: setup-nightly-build-datetime-envs.ts

      - name: Cleanup Outdated Daily Builds
        uses: Kiwi233/Translation-of-GTNH/.github/actions/run-script@master
        with:
          script: cleanup-nightly-builds.ts
