name: 0. Export PT Lang Package

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  PARATRANZ_TOKEN: ${{ secrets.PARATRANZ_TOKEN }}
  PT_18818_ID: ${{ secrets.PARATRANZ_DAILY_PROJECT_ID }}
  PARATRANZ_DAILY_PROJECT_ID: ${{ secrets.PARATRANZ_DAILY_PROJECT_ID }}
  BUILD_DIR: .build
  PT_LANG_PACKAGE_DIR: .build/pt-lang-package
  ASSETS_PATH: .assets.local.d
  PACKAGE_ZIP: pt-lang-package.zip
  RELEASE_TAG: pt-lang-package-latest

jobs:
  export:
    name: Export PT Lang Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Export PT Lang Package
        shell: bash
        run: stdbuf -oL -eL bun .github/scripts/export-pt-lang-package.ts

      - name: Zip Package
        shell: bash
        run: |
          mkdir -p "$ASSETS_PATH"
          python3 - <<'PY'
          import os
          import zipfile
          from pathlib import Path

          src = Path(os.environ["PT_LANG_PACKAGE_DIR"])
          dst = Path(os.environ["ASSETS_PATH"]) / os.environ["PACKAGE_ZIP"]
          with zipfile.ZipFile(dst, "w", zipfile.ZIP_DEFLATED, compresslevel=9) as zf:
              for path in sorted(p for p in src.rglob("*") if p.is_file()):
                  zf.write(path, path.relative_to(src).as_posix())
          print(f"[pt-lang-package] zipped {dst}")
          PY

      - name: Publish Latest Package Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "$RELEASE_TAG" -y --cleanup-tag || true
          git tag -f "$RELEASE_TAG"
          git push -f origin "$RELEASE_TAG"
          gh release create "$RELEASE_TAG" "$ASSETS_PATH/$PACKAGE_ZIP" \
            --title "PT Lang Package Latest" \
            --notes "从 PT 18818 导出的最新逐文件原文/译文包，供 ParaTranz 辅助脚本导入。" \
            --latest
